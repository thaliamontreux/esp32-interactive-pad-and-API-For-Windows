[env:esp32dev]
; Pinned to 6.4.0: espressif32 6.5.0+ ships an IDF/Arduino core whose BT
; controller config is incompatible with NimBLE-Arduino and aborts in
; esp_bt_controller_init() (ESP_ERR_INVALID_STATE). 6.4.0 is the last known
; good version for NimBLE-Arduino 1.4.x.
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
board_upload.flash_size = 4MB
board_build.flash_size = 4MB

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.4
    gilmaimon/ArduinoWebsockets @ ^0.5.3
    ESP32Async/ESPAsyncWebServer @ ^3.7.7
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    bitbank2/PNGdec @ ^1.0.1
    h2zero/NimBLE-Arduino @ ^1.4.1

build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    ; ESP32-2432S028R (Cheap Yellow Display) pinout - ROTATED LANDSCAPE
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DUSE_HSPI_PORT=1
    ; Touch uses separate VSPI bus (different pins from display)
    -DTOUCH_MISO=39
    -DTOUCH_MOSI=32
    -DTOUCH_SCLK=25
    -DTOUCH_IRQ=36
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_TOUCH_FREQUENCY=2500000
